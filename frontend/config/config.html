<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Configurações - Kit IA</title>
  <link rel="stylesheet" href="config-style.css">
</head>
<body>

  <header class="config-header">
    <div class="header-main">
      <h1>⚙️ Painel de Controle KIT</h1>
      <small id="statusText">Sincronizando com backend...</small>
    </div>
    <button onclick="window.close()" class="btn-exit">Sair</button>
  </header>

  <main class="config-container">
    
    <section class="config-section">
      <h2>Saúde do Sistema</h2>
      <div class="status-grid">
        <div class="status-card" data-server="Node Backend">
          <div class="status-info">
            <span class="status-led offline"></span>
            <strong>Node.js (3001)</strong>
          </div>
          <button class="btn-log-small" onclick="openLog(3001)">📜</button>
        </div>

        <div class="status-card" data-server="XTTS Server">
          <div class="status-info">
            <span class="status-led offline"></span>
            <strong>XTTS (5005)</strong>
          </div>
          <button class="btn-log-small" onclick="openLog(5005)">📜</button>
        </div>

        <div class="status-card" data-server="STT Server">
          <div class="status-info">
            <span class="status-led offline"></span>
            <strong>STT Server (5006)</strong>
          </div>
          <button class="btn-log-small" onclick="openLog(5006)">📜</button>
        </div>
      </div>
    </section>

    <section class="config-section">
      <h2>Cérebro (Ollama VL)</h2>
      <div class="setting-group">
        <label for="aiModel">Modelo Ativo:</label>
        <select id="aiModel">
            <option value="">Carregando modelos...</option>
        </select>
      </div>
      <div class="checkbox-group">
        <label><input type="checkbox" id="useXTTS"> Habilitar Voz (Daisy)</label>
        <label><input type="checkbox" id="microphone"> Habilitar Microfone</label>
      </div>
    </section>

    <section class="config-section">
      <div class="section-header">
        <h2>Gerenciar Skills</h2>
        <span class="badge"><span id="activeSkillsCount">0</span> Ativas</span>
      </div>
      <div id="skillsGrid" class="skills-grid">
        </div>
    </section>

    <footer class="config-footer">
      <button id="saveBtn" class="btn-primary">💾 Salvar Configurações</button>
    </footer>
  </main>

  <script src="config.js"></script>
</body>
</html>
