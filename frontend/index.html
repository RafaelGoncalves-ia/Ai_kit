<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Kit IA</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <header>
    <img id="kitIcon" src="assets/avatar/idle.png" alt="Kit IA">
    <h1>Kit IA</h1>
    <button id="configBtn" title="Configurações">⚙️</button>
  </header>

  <main id="chatContainer">
    <div id="chatBox"></div>

    <!-- 🔥 indicador de processamento -->
    <div id="processingIndicator" class="hidden">
      <span>Kit está processando...</span>
    </div>
  </main>

  <footer>
    <button id="fileBtn" title="Enviar Arquivo">📎</button>
    <input type="file" id="fileInput" style="display: none;" />

    <input id="input" type="text" placeholder="Digite um comando ou mensagem...">

    <button id="micBtn" title="Falar com a IA">🎤</button>
    <button id="sendBtn" title="Enviar">💬</button>
  </footer>

  <template id="messageTemplate">
    <div class="message">
      <span class="author"></span>
      <div class="text"></div>
    </div>
  </template>

  <!-- 🔥 template para mensagens do sistema (task, loading, etc) -->
  <template id="systemMessageTemplate">
    <div class="message system-msg">
      <span class="author">Sistema:</span>
      <div class="text"></div>
    </div>
  </template>

  <script src="js/mic.js"></script>
  <script src="script.js"></script>
</body>
</html>
