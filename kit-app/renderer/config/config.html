<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Kit Config</title>
  <link rel="stylesheet" href="./config.css">
</head>
<body>

<header class="topbar">
  <h1>⚙️ KIT Control</h1>
  <span id="statusText">Conectando...</span>
</header>

<!-- ======================
TABS PRINCIPAIS
====================== -->
<nav class="tabs">
  <button class="tab active" data-tab="system">Sistema</button>
  <button class="tab" data-tab="identity">Identidade</button>
  <button class="tab" data-tab="state">Estado</button>
  <button class="tab" data-tab="skills">Skills</button>
  <button class="tab" data-tab="inventory">Inventário</button>
</nav>

<main>

<!-- ======================
SISTEMA
====================== -->
<section id="system" class="tab-content active">
  <h2>Sistema</h2>

  <div class="card">
    <label>Modelo</label>
    <select id="aiModel"></select>
  </div>

  <div class="card">
    <label><input type="checkbox" id="useXTTS"> TTS</label>
    <label><input type="checkbox" id="microphone"> Microfone</label>
  </div>
</section>

<!-- ======================
IDENTIDADE
====================== -->
<section id="identity" class="tab-content">
  <h2>Identidade</h2>

  <div class="card">
    <label>Nome</label>
    <input id="kitName" value="KIT">

    <label>Descrição</label>
    <textarea id="kitDescription"></textarea>
  </div>

  <div class="card">
    <label>Personalidade Base</label>
    <textarea id="kitPersonality"></textarea>
  </div>
</section>

<!-- ======================
ESTADO
====================== -->
<section id="state" class="tab-content">
  <h2>Estado</h2>

  <!-- NEEDS -->
  <div class="card">
    <label>Aura: <span id="auraVal">50</span></label>
    <input type="range" id="aura" min="0" max="100">
  </div>

  <div class="card">
    <label>Energia: <span id="energyVal">50</span></label>
    <input type="range" id="energy" min="0" max="100">

    <label>Fome: <span id="hungerVal">50</span></label>
    <input type="range" id="hunger" min="0" max="100">

    <label>Humor: <span id="moodVal">50</span></label>
    <input type="range" id="mood" min="0" max="100">

    <!-- 🔥 NOVO -->
    <label>Higiene: <span id="hygieneVal">50</span></label>
    <input type="range" id="hygiene" min="0" max="100">
  </div>

  <!-- STATUS -->
  <div class="card">
    <h3>Status Atual</h3>
    <div class="current-status">
      <div class="status-item">
        Ação Atual: <span id="currentAction">Carregando...</span>
      </div>
      <div class="status-item">
        Local: <span id="currentLocation">Carregando...</span>
      </div>
      <div class="status-item">
        Estado Emocional: <span id="currentEmotion">Carregando...</span>
      </div>
    </div>
  </div>
</section>

<!-- ======================
SKILLS
====================== -->
<section id="skills" class="tab-content">
  <h2>Skills</h2>
  <div id="skillsGrid"></div>
</section>

<!-- ======================
INVENTÁRIO + SHOP
====================== -->
<section id="inventory" class="tab-content">
  <h2>Loja & Personalização</h2>

  <!-- TOKENS -->
  <div class="config-section">
    <h3>Saldo</h3>
    <p id="userTokens">Tokens: 0</p>
  </div>

  <!-- INVENTÁRIO VISUAL (SKINS ATIVAS) -->
  <div class="config-section">
    <h3>Itens Ativos (Visual da Kit)</h3>
    <div id="kitInventory" class="status-grid"></div>
  </div>

  <!-- SHOP -->
  <div class="config-section">
    <h3>Loja</h3>
    <div id="shopList" class="status-grid"></div>
  </div>
</section>
</main>

<footer>
  <button id="saveBtn">💾 Salvar</button>
</footer>

<script src="./config.js"></script>
<script src="./inventory.js"></script>
</body>
</html>
