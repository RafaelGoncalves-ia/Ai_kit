<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Notificação Kit IA</title>
  <link rel="stylesheet" href="./notify.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: sans-serif;
    }

    #notify {
      width: 100%;
      height: 100%;
      background: rgba(50, 50, 50, 0.9);
      color: #fff;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10px;
      box-sizing: border-box;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #notify.fade-out {
      opacity: 0;
    }

    .title {
      font-weight: bold;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .text {
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div id="notify">
    <div class="title" id="title">Kit IA</div>
    <div class="text" id="text"></div>
  </div>

  <script src="./notify.js"></script>
</body>
</html>
