<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="./widget.css" />
</head>
<body>
  <div class="box" id="widgetBox">
    
    <button id="plus" class="icon-button" title="Midia" aria-label="Midia">
      <img src="./assets/icones/Widget/foto-filme-audio.svg" alt="">
    </button>

    <textarea
      id="input"
      rows="1"
      placeholder="Pergunte ao Kit IA..."
      autocomplete="off"
      spellcheck="true"
    ></textarea>

    <button id="mic" class="icon-button" title="Ativar Microfone" aria-label="Ativar Microfone">
      <img src="./assets/icones/Widget/microfone.svg" alt="">
    </button>
    <button id="send" class="icon-button" title="Enviar Mensagem" aria-label="Enviar Mensagem">
      <img src="./assets/icones/Widget/enviar.svg" alt="">
    </button>
    
  </div>

  <script src="./widget.js"></script>
</body>
</html>
