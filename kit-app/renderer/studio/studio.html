<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KIT Studio Planner</title>
  <link rel="stylesheet" href="./studio.css">
</head>
<body>
  <div class="studio-shell">
    <header class="studio-topbar">
      <section class="context-bar" aria-label="Contexto do planejamento">
        <div class="brand-block">
          <img class="brand-logo" src="../assets/avatar/idle.png" alt="KIT">
          <div>
            <span class="eyebrow">KIT Studio</span>
            <strong>Studio Planner</strong>
          </div>
        </div>

        <label class="top-field">
          <span>Cliente selecionado</span>
          <input id="topClientName" type="text" autocomplete="off">
        </label>

        <label class="top-field">
          <span>Mes selecionado</span>
          <input id="topMonth" type="month">
        </label>

        <div class="plan-status">
          <span>Status do planejamento</span>
          <strong id="topPlanStatus">Rascunho</strong>
        </div>
      </section>

      <section class="top-actions" aria-label="Acoes principais">
        <button id="newPlannerButton" class="icon-action is-primary" type="button" title="Novo planejamento mensal" aria-label="Novo planejamento mensal">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6z"/></svg>
        </button>
        <button id="saveButton" class="icon-action" type="button" title="Salvar .kit" aria-label="Salvar .kit">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h12l2 2v16H5zm2 2v5h9V5zm0 14h10v-7H7zm2-12h5v2H9z"/></svg>
        </button>
        <button id="exportPdfButton" class="icon-action" type="button" title="Exportar PDF" aria-label="Exportar PDF">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 2h9l5 5v15H6zm8 2v5h4zM8 13h8v2H8zm0 4h8v2H8z"/></svg>
        </button>
        <button id="generateCardsButton" class="icon-action" type="button" title="Gerar cards" aria-label="Gerar cards">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h7v7H4zm9 0h7v7h-7zM4 14h7v5H4zm9 0h7v5h-7z"/></svg>
        </button>
        <button id="generateKiaButton" class="icon-action is-primary" type="button" title="Gerar arquivos .kia" aria-label="Gerar arquivos .kia">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l7 4v10l-7 4l-7-4V7zm0 2.3L7 8v8l5 2.7l5-2.7V8zm-1 4.7h2v4h3l-4 4l-4-4h3z"/></svg>
        </button>
      </section>
    </header>

    <section id="aiStatusStrip" class="ai-status is-idle" aria-live="polite">
      <div class="ai-status-copy">
        <span class="ai-dot" aria-hidden="true"></span>
        <span id="aiStatusText">IA em repouso</span>
      </div>
      <div class="ai-progress" aria-hidden="true">
        <div id="aiProgressFill" class="ai-progress-fill"></div>
      </div>
    </section>

    <main class="studio-main">
      <section class="studio-workspace" aria-label="Documento do Studio">
        <nav id="studioTabs" class="tab-strip" aria-label="Abas centrais"></nav>
        <section id="tabPanel" class="tab-panel" aria-live="polite"></section>
      </section>

      <aside class="studio-chat" aria-label="Chat especialista do Studio">
        <header class="chat-header">
          <div>
            <span class="eyebrow">KIT estrategista</span>
            <strong>Marketing e editorial</strong>
          </div>
          <span id="chatContextLabel" class="chat-context">Cliente e mes atuais</span>
        </header>

        <div id="chatMessageList" class="chat-message-list"></div>

        <form id="chatForm" class="chat-composer">
          <textarea id="chatInput" rows="4" placeholder="Peca ajustes estrategicos para o planejamento, cards ou roteiro"></textarea>
          <div class="chat-actions">
            <button id="chatPlannerButton" class="ghost-button" type="button">Gerar planejamento</button>
            <button id="chatCaptionButton" class="ghost-button" type="button">Legendas em rascunho</button>
            <button class="primary-button" type="submit">Enviar</button>
          </div>
        </form>
      </aside>
    </main>
  </div>

  <script src="./studio.js"></script>
</body>
</html>
