<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Kit IA</title>

  <!-- estilos -->
  <link rel="stylesheet" href="./style.css">

  <!-- libs -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

  <!-- 🔥 SIDEBAR -->
  <div id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <button id="newChatBtn">+ Novo Chat</button>
    </div>

    <div id="chatList"></div>
  </div>

  <!-- 🔥 BOTÃO -->
  <button id="toggleSidebar" class="sidebar-toggle">☰</button>

  <!-- ====================== -->
  <!-- HEADER -->
  <!-- ====================== -->
  <header class="header">
    <div class="header-left">
      <img id="kitIcon" src="assets/avatar/idle.png" alt="Kit IA">
      <h1>Kit</h1>
    </div>

    <div class="header-actions">
      <button id="thinkingBtn" class="btn-thinking" title="Thinking na rota curta">🧠</button>
      <button id="internetBtn" class="btn-internet" type="button" title="Pesquisa web ligada" aria-label="Pesquisa web ligada" aria-pressed="true">&#127760;</button>
      <div id="llmModeSelector" class="llm-mode-selector" data-state="fast">
        <button id="llmModeToggle" class="llm-mode-toggle" type="button" title="Fast ativo" aria-label="Fast ativo" aria-haspopup="true" aria-expanded="false">
          <span id="llmModeIcon" aria-hidden="true">&#9889;</span>
        </button>
        <div id="llmModeMenu" class="llm-mode-menu" role="menu" aria-label="Modo do modelo">
          <button id="llmFastBtn" class="llm-mode-btn active" type="button" role="menuitemradio" aria-checked="true" data-mode="fast">
            <span aria-hidden="true">&#9889;</span>
            <span>Fast</span>
          </button>
          <button id="llmSmartBtn" class="llm-mode-btn" type="button" role="menuitemradio" aria-checked="false" data-mode="smart">
            <span aria-hidden="true">&#129504;</span>
            <span>Smart</span>
          </button>
        </div>
        <span id="llmModeStatus" class="llm-mode-status" aria-live="polite">Fast ativo</span>
      </div>
      <div class="app-menu">
        <button id="appMenuBtn" class="btn-app-menu" type="button" title="Abrir menu de ferramentas" aria-label="Abrir menu de ferramentas" aria-expanded="false">
          <span aria-hidden="true">&#8942;</span>
        </button>
        <div id="appMenu" class="app-menu-dropdown" role="menu" aria-label="Ferramentas KIT">
          <button id="canvasBtn" class="app-menu-item" type="button" role="menuitem" title="Abrir Canvas KIT IA">
            <img src="assets/icones/Toolsbar/foto-filme-musica.svg" alt="">
            <span>Canvas</span>
          </button>
          <button id="studioBtn" class="app-menu-item" type="button" role="menuitem" title="Abrir KIT Studio">
            <img src="assets/icones/Studio/microchip.svg" alt="">
            <span>Studio</span>
          </button>
          <button id="presetManagerBtn" class="app-menu-item" type="button" role="menuitem" title="Abrir Gerenciador de Presets">
            <img src="assets/icones/config.svg" alt="">
            <span>Gerador de presets</span>
          </button>
        </div>
      </div>
      <button id="configBtn" class="btn-config" title="Configurações">⚙</button>
    </div>
  </header>

  <!-- ====================== -->
  <!-- CHAT -->
  <!-- ====================== -->
  <main id="chatContainer">
    <div id="chatBox"></div>

    <div id="processingIndicator" class="hidden">
      <span>Processando...</span>
    </div>

    <button id="scrollToBottomBtn" class="scroll-to-bottom-btn hidden" type="button" title="Voltar ao fim da conversa" aria-label="Voltar ao fim da conversa">V</button>
  </main>

  <!-- ====================== -->
  <!-- FOOTER -->
  <!-- ====================== -->
  <footer>
    <button id="fileBtn">📎</button>
    <input type="file" id="fileInput" style="display: none;" />

    <textarea id="input" rows="1" placeholder="Digite algo..." spellcheck="true"></textarea>

    <button id="micBtn" class="chat-icon-btn" type="button" title="Ativar Microfone" aria-label="Ativar Microfone">
      <img src="./assets/icones/Widget/microfone.svg" alt="">
    </button>
    <button id="sendBtn">➤</button>
  </footer>

  <!-- ====================== -->
  <!-- TEMPLATE -->
  <!-- ====================== -->
  <template id="messageTemplate">
    <div class="message">
      <span class="author"></span>
      <div class="text"></div>
    </div>
  </template>

  
  <!-- ====================== -->
  <!-- SCRIPTS -->
  <!-- ====================== -->
  <script src="./js/mic.js"></script>
  <script src="./script.js"></script>
  <script src="./sidebar.js"></script>

</body>
</html>
