<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Kit IA</title>

  <!-- estilos -->
  <link rel="stylesheet" href="./style.css">

  <!-- libs -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

  <!-- 🔥 SIDEBAR -->
  <div id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <button id="newChatBtn">+ Novo Chat</button>
    </div>

    <div id="chatList"></div>
  </div>

  <!-- 🔥 BOTÃO -->
  <button id="toggleSidebar" class="sidebar-toggle">☰</button>

  <!-- ====================== -->
  <!-- HEADER -->
  <!-- ====================== -->
  <header class="header">
    <div class="header-left">
      <img id="kitIcon" src="assets/avatar/idle.png" alt="Kit IA">
      <h1>Kit</h1>
    </div>

    <div class="header-actions">
      <button id="thinkingBtn" class="btn-thinking" title="Thinking na rota curta">🧠</button>
      <button id="internetBtn" class="btn-internet" type="button" title="Pesquisa web ligada" aria-label="Pesquisa web ligada" aria-pressed="true">&#127760;</button>
      <button id="presetManagerBtn" class="btn-canvas" type="button" title="Abrir Gerenciador de Presets" aria-label="Abrir Gerenciador de Presets">Presets</button>
      <button id="studioBtn" class="btn-canvas" type="button" title="Abrir KIT Studio" aria-label="Abrir KIT Studio">Studio</button>
      <button id="canvasBtn" class="btn-canvas" type="button" title="Abrir Canvas KIT IA" aria-label="Abrir Canvas KIT IA">Canvas</button>
      <button id="configBtn" class="btn-config" title="Configurações">⚙</button>
    </div>
  </header>

  <!-- ====================== -->
  <!-- CHAT -->
  <!-- ====================== -->
  <main id="chatContainer">
    <div id="chatBox"></div>

    <div id="processingIndicator" class="hidden">
      <span>Processando...</span>
    </div>

    <button id="scrollToBottomBtn" class="scroll-to-bottom-btn hidden" type="button" title="Voltar ao fim da conversa" aria-label="Voltar ao fim da conversa">V</button>
  </main>

  <!-- ====================== -->
  <!-- FOOTER -->
  <!-- ====================== -->
  <footer>
    <button id="fileBtn">📎</button>
    <input type="file" id="fileInput" style="display: none;" />

    <textarea id="input" rows="1" placeholder="Digite algo..." spellcheck="true"></textarea>

    <button id="micBtn">🎤</button>
    <button id="sendBtn">➤</button>
  </footer>

  <!-- ====================== -->
  <!-- TEMPLATE -->
  <!-- ====================== -->
  <template id="messageTemplate">
    <div class="message">
      <span class="author"></span>
      <div class="text"></div>
    </div>
  </template>

  
  <!-- ====================== -->
  <!-- SCRIPTS -->
  <!-- ====================== -->
  <script src="./js/mic.js"></script>
  <script src="./script.js"></script>
  <script src="./sidebar.js"></script>

</body>
</html>
